<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="../assets/icons/favicon.svg" />
    <link rel="stylesheet" href="../css/main.css" />
    <title>Resultado</title>
  </head>
  <body>
    <div id="swup" class="app-container transition-fade">
      <div class="circulo-decorativo circulo-1-resultado"></div>
      <div class="circulo-decorativo circulo-2-resultado"></div>
      <header>
        <h1>Destino Shinobi</h1>
        <nav id="main-nav">
          <ul>
            <li class="item-nav" data-page="index">Início</li>
            <li class="item-nav" data-page="quiz">Quiz</li>
            <li class="item-nav" data-page="resultado">Resultado</li>
          </ul>
        </nav>
        <div class="right-header">
          <button
            class="theme-switcher-grid"
            id="theme-switcher-grid"
            aria-label="Switch theme"
          >
            <div class="sun" id="sun" aria-hidden="true"></div>
            <div
              class="moon-overlay"
              id="moon-overlay"
              aria-hidden="true"
            ></div>
            <div
              class="cloud-ball cloud-ball-left"
              id="ball1"
              aria-hidden="true"
            ></div>
            <div
              class="cloud-ball cloud-ball-middle"
              id="ball2"
              aria-hidden="true"
            ></div>
            <div
              class="cloud-ball cloud-ball-right"
              id="ball3"
              aria-hidden="true"
            ></div>
            <div
              class="cloud-ball cloud-ball-top"
              id="ball4"
              aria-hidden="true"
            ></div>
            <div class="star" id="star1" aria-hidden="true"></div>
            <div class="star" id="star2" aria-hidden="true"></div>
            <div class="star" id="star3" aria-hidden="true"></div>
            <div class="star" id="star4" aria-hidden="true"></div>
          </button>
          <div class="perfil">
            <img
              src="../assets/icons/perfil-icone.svg"
              alt="Perfil do usuário"
            />
          </div>
        </div>
      </header>
      <main>
        <section id="topo-resultado">
          <p>jornada de passagem concluída</p>
          <h2>Seu destino foi selado!</h2>
        </section>
        <section id="conteudo-principal">
          <div id="conteudo-esq">
            <!-- <img id="img-personagem" src="../assets/imagens/personagens/naruto.webp" alt="Naruto" /> -->
            <img id="img-personagem" src="" alt="Personagem">
          </div>
          <div id="conteudo-dir">
            <!-- <h3 id="nome-personagem">Naruto Uzumaki</h3> -->
            <h3 id="nome-personagem"></h3>
            <p id="pontuacao-valor">A pontuação obtida foi: <span id="pontos">14</span></p>
            <!-- <p id="descricao">
              Sua determinação é inabalável e seu coração transborda vontade do
              fogo. Você nunca volta atrás em sua palavra e protege seus amigos
              a qualquer custo.
            </p> -->
            <p id="descricao"></p>
            <!-- <p id="citacao">
              "Eu nunca volto atrás na minha palavra... esse é o meu jeito
              ninja!"
            </p> -->
            <p id="citacao"></p>
            <section id="container-chakra-afinidade">
              <div id="card-chakra" class="card-cka-afind">
                <span>Chakra</span>
                <!-- <p id="chakra-valor">Imensurável</p> -->
                <p id="chakra-valor"></p>
              </div>
              <div id="card-afinidade" class="card-cka-afind">
                <span>Afinidade</span>
                <!-- <p id="afinidade-valor">Vento</p> -->
                <p id="afinidade-valor"></p>
              </div>
            </section>
            <button id="btn-tentar-novamente">
              <span class="conteudo-btn">
                <span class="icone">
                  <img src="../assets/icons/reload-icone.svg" alt="ícone tentar novamente">
                </span>
                Tentar Novamente
              </span>
            </button>
            <button id="btn-compartilhar">
              <span class="conteudo-btn">
                <span class="icone">
                  <img src="../assets/icons/compartilhar-icone.svg" alt="ícone compartilhar">
                </span>
                Compartilhar Destino
              </span>
            </button>
          </div>
        </section>
      </main>
      <footer>
        <div class="left-footer">
          <h2>Destino Shinobi</h2>
          <p>© 22nd Century Royal Archive. All rights reserved.</p>
        </div>
        <div class="right-footer">
          <ul>
            <li class="itens-footer">
              <a href="#">Política de Privacidade</a>
            </li>
            <li class="itens-footer">
              <a href="#">Termos e Condições</a>
            </li>
            <li class="itens-footer">
              <a href="#">Suporte</a>
            </li>
          </ul>
        </div>
      </footer>
    </div>
    <div class="overlay"></div>
    <script type="module" src="../js/main.js"></script>
  </body>
</html>
